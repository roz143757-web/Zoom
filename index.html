<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zoom Workplace</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:sans-serif;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#0d0d0d;
}

.card{
  width:90%;
  max-width:350px;
  background:#fff;
  border-radius:20px;
  padding:25px;
  text-align:center;
  box-shadow:0 20px 50px rgba(0,0,0,0.5);
  animation:cardIn .6s ease;
}

@keyframes cardIn{
  from{opacity:0; transform:translateY(30px);}
  to{opacity:1; transform:translateY(0);}
}

.logo{
  width:80px;
  height:80px;
  margin:0 auto 15px;
  border-radius:20px;
  background:#0b5cff;
  display:flex;
  justify-content:center;
  align-items:center;
  color:#fff;
  font-size:20px;
  font-weight:bold;
}

h1{
  font-size:24px;
  margin-bottom:10px;
}

p{
  font-size:14px;
  color:#555;
  margin-bottom:20px;
}

button{
  width:100%;
  padding:18px;
  font-size:20px;
  border:none;
  border-radius:12px;
  background:#0b5cff;
  color:#fff;
  font-weight:bold;
}

button:disabled{
  background:#888;
}

.dots::after{
  content:"";
  animation:dots 1s steps(4,end) infinite;
}

@keyframes dots{
  0%{content:"";}
  25%{content:".";}
  50%{content:"..";}
  75%{content:"...";}
  100%{content:"";}
}
</style>
</head>

<body>

<div class="card">
  <div class="logo">Zoom</div>
  <h1>Zoom Workplace</h1>
  <p>👇 Niche button dabao</p>
  <button id="btn" onclick="downloadZoom()">DOWNLOAD</button>
</div>

<script>
function speak(text){
  try{
    const msg = new SpeechSynthesisUtterance(text);
    msg.lang = "hi-IN";
    speechSynthesis.speak(msg);
  }catch(e){}
}

function downloadZoom(){
  const btn = document.getElementById("btn");

  btn.disabled = true;
  btn.innerHTML = 'DOWNLOADING<span class="dots"></span>';

  speak("Download start ho raha hai");

  setTimeout(function(){
    window.open("https://zoom.us/client/latest/zoom.apk", "_blank");
  }, 700);

  setTimeout(function(){
    btn.disabled = false;
    btn.innerHTML = "DOWNLOAD";
  }, 20000);
}
</script>

</body>
</html>
